r: var(--text-color); transition: all 0.2s ease; } .project-list li a:hover { padding-left: 15px; border-bottom-color: var(--border-color); } .project-list li a span { font-size: 0.8rem; font-weight: 900; color: var(--text-color); background-color: transparent; border: 2px solid var(--border-color); padding: 0.3rem 0.8rem; text-align: right; margin-left: 1rem; text-transform: uppercase; transition: all 0.2s ease; } .project-list li a:hover span { background-color: var(--accent-color); color: #ffffff; border-color: var(--accent-color); }  #hover-image-wrapper { position: fixed; top: 0; left: 0; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform, left, top, opacity; } #hover-image-wrapper.active { opacity: 1; } #hover-image { width: 380px; height: 250px; object-fit: cover; box-shadow: 15px 15px 0 var(--border-color); border: 4px solid var(--border-color); background: var(--bg-color); padding: 10px;  }  .text-list li { display: flex; justify-content: space-between; align-items: baseline; font-size: 1.1rem; padding: 0.8rem 0; border-bottom: 1px solid var(--muted-color); } .text-list li strong { font-weight: 900; margin-right: 1rem; } .text-list li span { color: var(--muted-color); font-weight: 700; font-size: 0.9rem; } .skills-block { font-size: 1.2rem; font-weight: 700; line-height: 1.8; text-transform: uppercase; } .contact-list a { font-weight: 900; font-size: 1.2rem; } .contact-list a:hover { background-color: var(--accent-color); color: #ffffff; padding: 0 5px; }  .currently-analyzing { border: 2px solid var(--border-color); padding: 1.5rem; margin-bottom: 2rem; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; } .currently-analyzing p { margin: 0.5rem 0; font-size: 0.9rem; } footer { margin-top: 5rem; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; color: var(--muted-color); text-align: center; }  @keyframes screenShake { 0%     <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            margin: 0;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        .hero-title::after {
            content: "SAGAR SHRESTHA";
            position: absolute;
            left: 5px;
            top: 5px;
            color: transparent;
            -webkit-text-stroke: 2px var(--accent-color);
            z-index: -1;
            opacity: 0.5;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 2rem);
            font-weight: 700;
            color: var(--muted-color);
            margin: 1rem 0 3rem 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .enter-btn {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            text-decoration: none;
            color: var(--text-color);
            border: 4px solid var(--border-color);
            padding: 1rem 3rem;
            text-transform: uppercase;
            background: transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 10px 10px 0 var(--border-color);
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: var(--accent-color);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .enter-btn:hover {
            color: #ffffff;
            border-color: var(--accent-color);
            box-shadow: 10px 10px 0 var(--accent-color);
            transform: translate(-2px, -2px);
        }

        .enter-btn:hover::before {
            left: 0;
        }

        /* Subtle background noise/grid */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            z-index: 1;
            pointer-events: none;
        }

        /* Glitch animation for impact */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        .glitch-effect:hover {
            animation: glitch 0.2s cubic-bezier(.25, .46, .45, .94) both infinite;
            color: var(--accent-color);
        }
    </style>
